<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Faculty</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_premium.css') }}">
</head>
<body>

<div class="dashboard-container">
    {% set active_exam = none %}
    {% include 'faculty/components/sidebar.html' %}

    <main class="main-wrapper" id="mainWrapper" style="margin-right: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F8FAFC;">
        <div class="animate" style="width: 100%; max-width: 450px;">
            <div style="background: white; border-radius: 24px; padding: 2.5rem 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="font-size: 2.5rem; margin-bottom: 1rem;">🔐</div>
                    <h2 style="margin-bottom: 0.25rem; font-weight: 800; color: #1E293B; font-size: 1.5rem;">Change Password</h2>
                    <p style="color: #64748B; font-size: 0.9rem;">Secure your faculty account</p>
                </div>

                <form method="POST" id="pwForm">
                    <div style="margin-bottom: 1.5rem;">
                        <label for="currentPw" style="display: block; color: #1E293B; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem;">Current Password</label>
                        <input type="password" name="current_password" id="currentPw" placeholder="Enter current password" required style="width: 100%; padding: 0.8rem 1rem; border: 1.5px solid #E2E8F0; border-radius: 12px; color: #1E293B; background: white; outline: none; transition: border-color 0.3s; box-sizing: border-box;">
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label for="newPw" style="display: block; color: #1E293B; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem;">New Password</label>
                        <div style="position: relative;">
                            <input type="password" name="new_password" id="newPw" placeholder="Enter new password" required style="width: 100%; padding: 0.8rem 1rem; padding-right: 40px; border: 1.5px solid #E2E8F0; border-radius: 12px; color: #1E293B; background: white; outline: none; transition: border-color 0.3s; box-sizing: border-box;">
                            <i class="fas fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #64748B; cursor: pointer;" onclick="togglePassword('newPw', this)"></i>
                        </div>
                        <div style="height: 4px; background: #E2E8F0; border-radius: 2px; margin-top: 8px; overflow: hidden;">
                            <div id="strengthFill" style="height: 100%; width: 0%; transition: all 0.3s; background: #ef4444;"></div>
                        </div>
                        <div id="pwChecklist" style="margin-top: 10px; font-size: 0.75rem; color: #64748B; display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                            <div id="chkLen">✕ Min 8 chars</div>
                            <div id="chkUpper">✕ Uppercase</div>
                            <div id="chkLower">✕ Lowercase</div>
                            <div id="chkNum">✕ Number</div>
                            <div id="chkSpec">✕ Special char</div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label for="confirmPw" style="display: block; color: #1E293B; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem;">Confirm New Password</label>
                        <div style="position: relative;">
                            <input type="password" name="confirm_password" id="confirmPw" placeholder="Confirm new password" required style="width: 100%; padding: 0.8rem 1rem; padding-right: 40px; border: 1.5px solid #E2E8F0; border-radius: 12px; color: #1E293B; background: white; outline: none; transition: border-color 0.3s; box-sizing: border-box;">
                            <i class="fas fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #64748B; cursor: pointer;" onclick="togglePassword('confirmPw', this)"></i>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 2rem;">
                        <a href="{{ url_for('faculty.my_account') }}" class="schedule-btn" style="flex: 1; text-align: center; background: #F1F5F9; color: #475569; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 700;">Cancel</a>
                        <button type="submit" id="submitBtn" class="schedule-btn" style="flex: 2; padding: 12px; border-radius: 12px; font-weight: 700; background: #4F46E5; color: white; border: none; cursor: pointer; transition: all 0.3s;" disabled>Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script>
const pw = document.getElementById('newPw');
const confirm = document.getElementById('confirmPw');
const fill = document.getElementById('strengthFill');
const btn = document.getElementById('submitBtn');

function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

const checks = {
    chkLen: p => p.length >= 8,
    chkUpper: p => /[A-Z]/.test(p),
    chkLower: p => /[a-z]/.test(p),
    chkNum: p => /[0-9]/.test(p),
    chkSpec: p => /[!@#$%^&*(),.?":{}|<>]/.test(p)
};

function validate() {
    const val = pw.value;
    let score = 0;
    for (const [id, fn] of Object.entries(checks)) {
        const el = document.getElementById(id);
        if (fn(val)) { el.style.color = '#10B981'; el.textContent = '✓ ' + el.textContent.slice(2); score++; }
        else { el.style.color = '#64748B'; el.textContent = '✕ ' + el.textContent.slice(2); }
    }
    const pct = (score / 5) * 100;
    fill.style.width = pct + '%';
    fill.style.background = pct <= 40 ? '#ef4444' : pct <= 70 ? '#f59e0b' : '#10B981';
    btn.disabled = score < 5 || !val || !confirm.value || val !== confirm.value;
    btn.style.opacity = btn.disabled ? '0.5' : '1';
    btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
}

pw.addEventListener('input', validate);
confirm.addEventListener('input', validate);

function toggleAccordion(element) {
    element.classList.toggle('active');
    var content = element.nextElementSibling;
    if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
    } else {
        content.classList.add('expanded');
    }
}
</script>

</body>
</html>
