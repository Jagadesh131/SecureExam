{% extends "base.html" %}
{% block title %}Forgot Password | SecureExam{% endblock %}

{% block content %}
<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
    }
    .fp-container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
        margin-top: 50px;
    }
    .back-btn {
        color: white;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 16px;
    }
    .fp-card {
        background: white;
        border-radius: 24px;
        padding: 40px 30px;
        position: relative;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        margin-top: 40px;
    }
    .fp-avatar {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #D946EF, #8B5CF6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid white;
        font-size: 30px;
    }
    .fp-title {
        font-size: 24px;
        font-weight: 800;
        color: #111827;
        margin-top: 10px;
        margin-bottom: 5px;
    }
    .fp-subtitle {
        color: #6B7280;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .fp-form {
        text-align: left;
    }
    .fp-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
    }
    .fp-input {
        width: 100%;
        padding: 14px;
        border: 1px solid #D1D5DB;
        border-radius: 12px;
        font-size: 16px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }
    .fp-divider {
        text-align: center;
        color: #9CA3AF;
        font-weight: 600;
        font-size: 12px;
        margin: 5px 0 20px;
    }
    .fp-submit {
        width: 100%;
        background-color: #E5E7EB;
        color: #9CA3AF;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: not-allowed;
        margin-top: 5px;
        transition: all 0.3s ease;
    }
    .fp-submit.active {
        background-color: #4F46E5;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3);
    }
    nav.navbar, footer { display: none; } /* Hide default navbar and footer */
</style>

<div class="fp-container">
    <a href="{{ url_for('faculty.login') }}" class="back-btn">
        <i class="fas fa-chevron-left" style="margin-right: 5px;"></i> Back to Login
    </a>

    <div class="fp-card">
        <div class="fp-avatar">🔑</div>
        
        <h1 class="fp-title">Forgot Password?</h1>
        <p class="fp-subtitle">Enter your email or Faculty ID to reset</p>

        <form method="POST" action="{{ url_for('faculty.forgot_password') }}" class="fp-form" id="resetForm">
            <label class="fp-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="fp-input" placeholder="your.email@university.edu" oninput="checkInput()">

            <div class="fp-divider">OR</div>

            <label class="fp-label" for="faculty_id">Faculty ID</label>
            <input type="text" id="faculty_id" name="faculty_id" class="fp-input" placeholder="FAC001" oninput="checkInput()">

            <button type="submit" class="fp-submit" id="submitBtn" disabled>Find My Account</button>
        </form>
    </div>
</div>

<script>
    function checkInput() {
        const email = document.getElementById('email').value;
        const facId = document.getElementById('faculty_id').value;
        const btn = document.getElementById('submitBtn');
        
        if (email.trim() !== '' || facId.trim() !== '') {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }
</script>
{% endblock %}
