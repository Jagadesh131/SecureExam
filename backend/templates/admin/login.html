{% extends "base.html" %}
{% block title %}Admin Login — SecureExam{% endblock %}

{% block content %}
<div class="animate" style="width: 100%; max-width: 480px;">
    <div style="background: white; border-radius: 48px; padding: 4rem 3rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 1px solid rgba(255,255,255,0.1);">
        <!-- Holographic Shield Icon -->
        <div style="width: 100px; height: 100px; background: #0F172A; border-radius: 30px; display: flex; justify-content: center; align-items: center; margin: -5rem auto 2.5rem; font-size: 3rem; color: #FF3333; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 5px solid white;">
            <i class="fas fa-shield-halved"></i>
        </div>

        <div style="text-align: center; margin-bottom: 3rem;">
            <h2 style="font-size: 2rem; font-weight: 900; color: #0F172A; margin-bottom: 0.5rem;">Admin Access</h2>
            <p style="color: #64748B; font-weight: 600;">Authorized Personnel Only</p>
        </div>

        <form action="{{ url_for('admin.authenticate') }}" method="POST">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 800; color: #475569; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem;">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94A3B8;"></i>
                    <input type="text" id="username" name="username" placeholder="Master Administrator" required autofocus style="width: 100%; padding: 16px 16px 16px 50px; border-radius: 18px; border: 1px solid #E2E8F0; background: #F8FAFC; font-weight: 600; outline: none; transition: all 0.2s;" onfocus="this.style.borderColor='#FF3333'; this.style.boxShadow='0 0 0 4px rgba(255,51,51,0.05)'">
                </div>
            </div>

            <div style="margin-bottom: 2.5rem;">
                <label style="display: block; font-weight: 800; color: #475569; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem;">Access Key</label>
                <div style="position: relative;">
                    <i class="fas fa-key" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94A3B8;"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••••••" required style="width: 100%; padding: 16px 16px 16px 50px; border-radius: 18px; border: 1px solid #E2E8F0; background: #F8FAFC; font-weight: 600; outline: none; transition: all 0.2s;" onfocus="this.style.borderColor='#FF3333'; this.style.boxShadow='0 0 0 4px rgba(255,51,51,0.05)'">
                </div>
            </div>

            <button type="submit" style="width: 100%; padding: 18px; border-radius: 20px; background: #111; color: white; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);" onmouseover="this.style.transform='translateY(-2px)'; this.style.background='#000'" onmouseout="this.style.transform='translateY(0)'; this.style.background='#111'">
                UNLOCK TERMINAL <i class="fas fa-chevron-right"></i>
            </button>
        </form>

        <!-- Quick Access Helper -->
        <div style="margin-top: 2.5rem; padding: 1.25rem; background: #FFF1F2; border-radius: 20px; border: 1px dashed #FECDD3; text-align: center; cursor: pointer;" onclick="document.getElementById('username').value='admin'; document.getElementById('password').value='admin123';">
            <p style="font-size: 0.7rem; font-weight: 800; color: #E11D48; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">System Credentials</p>
            <div style="font-size: 1rem; font-weight: 900; color: #9F1239;">admin / admin123</div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 2rem;">
        <a href="{{ url_for('welcome') }}" style="color: rgba(255,255,255,0.5); text-decoration: none; font-weight: 700; font-size: 0.85rem;">
            <i class="fas fa-arrow-left"></i> Return to Main Portal
        </a>
    </div>
</div>
{% endblock %}
