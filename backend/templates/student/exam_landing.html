{% extends "base.html" %}
{% block title %}{{ exam.exam_name }} — Register{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">📝</div>
        <h1 class="auth-title">{{ exam.exam_name }}</h1>
        <p class="auth-subtitle">{{ exam.subject }} · {{ exam.duration }} minutes</p>

        <form method="POST" action="{{ url_for('student.start_exam', exam_code=exam.exam_code) }}">
            <div class="form-group">
                <label class="form-label" for="student_name">Full Name</label>
                <input type="text" id="student_name" name="student_name" class="form-input" placeholder="e.g. John Doe" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="reg_number">Registration Number</label>
                <input type="text" id="reg_number" name="reg_number" class="form-input" placeholder="e.g. 2023CSE001" required style="text-transform: uppercase;">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Start Exam</button>
        </form>

        <p class="text-center text-muted text-sm mt-2">⚠️ You can only attempt this exam once. Make sure you're ready!</p>
    </div>
</div>
{% endblock %}
